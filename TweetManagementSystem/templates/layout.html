{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <title>
      {% block title %} Build First Project With Django {% endblock %}
    </title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <!-- LEFT: Brand -->
        <a class="navbar-brand fw-bold d-flex align-items-center">
          👩🏻‍💻 <span class="ms-2 brand-text">TweetBar</span>
        </a>
        <!-- TOGGLER (mobile ke liye) -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <!-- CENTER: Search Bar -->
          <form
            class="d-flex mx-auto"
            role="search"
            method="GET"
            action="{% url 'tweet_list' %}"
            style="width: 40%"
          >
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search by username"
              name="q"
              value="{{ request.GET.q|default:'' }}"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>

          <!-- RIGHT: Buttons -->
          <div class="d-flex align-items-center">
            <a href="{% url 'tweet_list' %}" class="btn btn-primary mx-2">
              Tweet Home
            </a>

            {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button class="btn btn-danger mx-2" type="submit">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'register' %}" class="btn btn-primary mx-2">
              Register
            </a>
            <a href="{% url 'login' %}" class="btn btn-success mx-2"> Login </a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>
    <div class="container">{% block content %} {% endblock %}</div>
  </body>
</html>
